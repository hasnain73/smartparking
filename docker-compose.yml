version: "3.9"

services:
  db:
    image: postgis/postgis:16-3.4-alpine
    container_name: parkr_db
    environment:
      POSTGRES_USER: parkr
      POSTGRES_PASSWORD: parkr
      POSTGRES_DB: parkrdb
    ports:
      - "5432:5432"
    volumes:
      - parkr_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parkr -d parkrdb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  parkr_pgdata: